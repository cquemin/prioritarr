name: Build and Push Docker Image

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'prioritarr/**'
      - 'contract-tests/**'
      - 'openapi.json'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: prioritarr/frontend
        run: npm ci --legacy-peer-deps
      - name: Generate API types + drift check
        working-directory: prioritarr/frontend
        run: |
          npm run gen:api
      - name: Build
        working-directory: prioritarr/frontend
        run: npm run build
      - name: Unit tests
        working-directory: prioritarr/frontend
        run: npm test

  openapi-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validator
        run: pip install openapi-spec-validator
      - name: Validate openapi.json
        run: python -c "from openapi_spec_validator import validate_spec; import json; validate_spec(json.load(open('openapi.json')))"
      - name: Every /api/v2/* operation has api_key security
        run: |
          python <<'PY'
          import json, sys
          spec = json.load(open("openapi.json"))
          missing = []
          for p, ops in spec["paths"].items():
              if not p.startswith("/api/v2/"): continue
              for method, op in ops.items():
                  if method.startswith("x-"): continue
                  sec = op.get("security") or []
                  if not any("api_key" in entry for entry in sec):
                      missing.append(f"{method.upper()} {p}")
          if missing:
              print("Operations missing api_key security:\n  " + "\n  ".join(missing))
              sys.exit(1)
          print(f"All v2 operations carry api_key security.")
          PY

  app-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Start upstream mocks
        run: docker compose -f contract-tests/mocks/docker-compose.yml up -d

      - name: Wait for mocks to respond
        run: |
          timeout 30 bash -c 'until curl -fsS http://localhost:9001/sonarr/api/v3/system/status >/dev/null; do sleep 1; done'
          timeout 30 bash -c 'until curl -fsS "http://localhost:9002/api/v2?apikey=x&cmd=arnold" >/dev/null; do sleep 1; done'

      - name: Build prioritarr image
        run: docker build -f prioritarr/Dockerfile -t prioritarr:test .

      - name: Start prioritarr in test mode
        run: |
          docker run -d --name prioritarr \
            --network host \
            --tmpfs /config:rw,size=64m \
            -e PRIORITARR_TEST_MODE=true \
            -e PRIORITARR_DRY_RUN=false \
            -e PRIORITARR_SONARR_URL=http://localhost:9001/sonarr \
            -e PRIORITARR_SONARR_API_KEY=mock \
            -e PRIORITARR_TAUTULLI_URL=http://localhost:9002 \
            -e PRIORITARR_TAUTULLI_API_KEY=mock \
            -e PRIORITARR_PLEX_URL=http://localhost:9003 \
            -e PRIORITARR_PLEX_TOKEN=mock \
            -e PRIORITARR_QBIT_URL=http://localhost:9004 \
            -e PRIORITARR_SAB_URL=http://localhost:9005/sabnzbd \
            -e PRIORITARR_SAB_API_KEY=mock \
            -e PRIORITARR_API_KEY=ci-test-key \
            prioritarr:test

      - name: Wait for prioritarr to be live
        run: timeout 120 bash -c 'until curl -fsS http://localhost:8000/openapi.json >/dev/null; do sleep 2; done'

      - name: Verify committed openapi.json matches runtime (app)
        run: |
          curl -fsS http://localhost:8000/openapi.json | python -m json.tool --sort-keys > /tmp/runtime_app.json
          python -m json.tool --sort-keys openapi.json > /tmp/committed.json
          diff -u /tmp/committed.json /tmp/runtime_app.json

      - name: Install contract-tests dependencies
        run: pip install -r contract-tests/requirements.txt

      - name: Install UI deps for Playwright
        working-directory: prioritarr/frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        working-directory: prioritarr/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E (UI happy path)
        working-directory: prioritarr/frontend
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8000
          PLAYWRIGHT_API_KEY: ci-test-key
        run: npx playwright test

      - name: Run contract tests (app)
        env:
          CONTRACT_TEST_BASE_URL: http://localhost:8000
          CONTRACT_TEST_API_KEY: ci-test-key
        run: python -m pytest contract-tests/ -v

      - name: Dump prioritarr logs on failure
        if: failure()
        run: docker logs prioritarr

  build-and-push-app:
    needs: [app-contract-tests, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (app)
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (app)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prioritarr/Dockerfile
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
