# Shadow deploy for prioritarr-app. Sits alongside the python prioritarr
# container on port 8001, reading the SAME Redis and the SAME Sonarr /
# Tautulli / qBit / SAB upstreams. During the 72h soak (Spec B §Task 15),
# webhooks still go to the python container — the kotlin container runs
# idle for observability, and a diff script (scripts/shadow_diff.sh)
# dual-sends a sample of webhooks to both and asserts byte-identical
# responses.
#
# Usage:
#   docker-compose -f media-stack-v3.yml -f prioritarr/prioritarr-app/shadow-compose.yml up -d prioritarr-app
#
# To cut over (Spec B §Task 16): flip Sonarr + Tautulli webhook URLs from
# http://prioritarr:8000 to http://prioritarr-app:8000. Python stays up
# as idle rollback for 7 days.

services:
  prioritarr-app:
    image: ghcr.io/cquemin/prioritarr-app:latest
    container_name: prioritarr-app
    restart: unless-stopped
    # Shadow only — dry_run=true so the kotlin backend never pauses/resumes
    # a torrent during the soak period. Flip to false as part of cutover.
    environment:
      PRIORITARR_DRY_RUN: "true"
      PRIORITARR_TEST_MODE: "false"
      PRIORITARR_SONARR_URL: http://sonarr:8989/sonarr
      PRIORITARR_SONARR_API_KEY: ${PRIORITARR_SONARR_API_KEY}
      PRIORITARR_TAUTULLI_URL: http://tautulli:8181
      PRIORITARR_TAUTULLI_API_KEY: ${PRIORITARR_TAUTULLI_API_KEY}
      PRIORITARR_QBIT_URL: http://vpn:6880
      PRIORITARR_QBIT_USERNAME: ${PRIORITARR_QBIT_USERNAME:-admin}
      PRIORITARR_QBIT_PASSWORD: ${PRIORITARR_QBIT_PASSWORD}
      PRIORITARR_SAB_URL: http://sabnzbd:8080
      PRIORITARR_SAB_API_KEY: ${PRIORITARR_SAB_API_KEY}
      PRIORITARR_PLEX_URL: http://plex:32400
      PRIORITARR_PLEX_TOKEN: ${PRIORITARR_PLEX_TOKEN}
      # Shared Redis — the kotlin backend reads the same plex_key→series_id
      # hash the python backend writes. During shadow the kotlin process
      # does not write (dry_run=true plus no webhook traffic), so there's
      # no conflict. Post-cutover the roles swap.
      PRIORITARR_REDIS_URL: redis://:${REDIS_PASSWORD}@redis-m:6379/1
      JAVA_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "8001:8000"
    networks:
      - t2_proxy
    volumes:
      # Separate state DB from the python one during shadow. Post-cutover,
      # point at the same /config so audit_log history is preserved in a
      # single place, OR start fresh and archive the python DB.
      - ${DOCKERDIR}/prioritarr-app/config:/config

networks:
  t2_proxy:
    external: true
